name: Rebuild COT data

# Runs automatically whenever the editable CSV source files change on main
# (including edits made directly in the GitHub web UI), and rebuilds
# data/cot.json, committing it back to the repo. GitHub Pages then picks up
# the new data/cot.json on its own within about a minute.

on:
  push:
    branches: [main]
    paths:
      - "data-source/weekly.csv"
      - "data-source/meta.csv"
      - "scripts/build_data.py"
  workflow_dispatch: {}  # lets you also trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build data/cot.json
        run: python3 scripts/build_data.py

      - name: Commit updated cot.json
        run: |
          git config user.name "cot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/cot.json
          if git diff --cached --quiet; then
            echo "No changes to data/cot.json — nothing to commit."
          else
            git commit -m "Auto-rebuild cot.json from CSV update"
            git push
          fi
